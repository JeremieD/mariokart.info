<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" class="icon-checkmark">
  <style>
    .icon-checkmark polyline {
      stroke-dasharray: 32 32;
      stroke-dashoffset: 40;
      transition: .3s ease stroke-dashoffset;
    }
    :is([selected], .selected) .icon-checkmark polyline { stroke-dashoffset: 0; }
  </style>
  <polyline points="2,8 6,12 14,4" fill="none" stroke="currentColor" stroke-width="2"/>
</svg>
