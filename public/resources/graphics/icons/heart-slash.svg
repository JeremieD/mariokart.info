    .icon-heart #fill path {
      transform-origin: center;
      scale: 1;
      transition: .2s ease-in-out scale;
    }
    :is([selected], .selected) .icon-heart #fill path { scale: 0; }
  </style>
  <mask id="fill">
    <rect x="-250" y="-250" width="2000" height="2000" fill="white" />
    <path d="m 750,1280 640,-640 c 74,-73 110,-169 110,-265 0,-96 -36,-192 -110,-265 C 1317,36 1221,0 1125,0 1029,0 933,36 860,110 L 750,220 640,110 C 567,36 471,0 375,0 279,0 183,36 110,110 a 374.2,374.2 0 0 0 0,530 z" />
  </mask>
  <mask id="slash">
    <rect x="-250" y="-250" width="2000" height="2000" fill="white" />
    <line x1="0" y1="-80" x2="1380" y2="1300" fill="none" stroke="black" stroke-width="440"></line>
  </mask>

  <g mask="url(#slash)">
    <path d="m 750,1280 640,-640 c 74,-73 110,-169 110,-265 0,-96 -36,-192 -110,-265 C 1317,36 1221,0 1125,0 1029,0 933,36 860,110 L 750,220 640,110 C 567,36 471,0 375,0 279,0 183,36 110,110 a 374.2,374.2 0 0 0 0,530 z" fill="none" stroke="currentColor" stroke-width="160"/>
    <path d="m 750,1280 640,-640 c 74,-73 110,-169 110,-265 0,-96 -36,-192 -110,-265 C 1317,36 1221,0 1125,0 1029,0 933,36 860,110 L 750,220 640,110 C 567,36 471,0 375,0 279,0 183,36 110,110 a 374.2,374.2 0 0 0 0,530 z" fill="currentColor" mask="url(#fill)"/>
  </g>
  <line x1="0" y1="-80" x2="1380" y2="1300" stroke="currentColor" stroke-width="160"></line>
</svg>
